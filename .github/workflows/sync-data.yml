name: Sync Data Daily

on:
  schedule:
    # 每天 UTC 00:00 執行 (台灣時間 08:00)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允許手動觸發

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Update markets data
      run: node scripts/update-markets.js
      
    - name: Update news data
      run: node scripts/update-news.js
      continue-on-error: true
      
    - name: Commit and push if changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/
        git diff --staged --quiet || (git commit -m "🔄 Auto-sync data: $(date +'%Y-%m-%d %H:%M')" && git push)
